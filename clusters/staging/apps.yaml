apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: staging-fsn-apps
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - app: headlamp
            env: staging
          - app: metrics-server
            env: staging
          - app: reloader
            env: staging
          - app: kubescape
            env: staging
  template:
    metadata:
      name: "{{app}}"
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: http://gitea-http.gitea.svc.cluster.local:3000/admin/app-of-apps.git
        targetRevision: main
        path: "apps/{{app}}"
        helm:
          valueFiles:
            - values.yaml
            - "values-{{env}}.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{app}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
