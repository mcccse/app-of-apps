# apps/victoriametrics/values.yaml
victoria-metrics-k8s-stack:
  grafana:
    enabled: false

  vmsingle:
    enabled: true
    spec:
      retentionPeriod: "10d"
      extraArgs:
        memory.allowedPercent: "60"
        fs.disableMmap: "true"
      storage:
        storageClassName: local-path
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
      resources:
        requests:
          memory: 256Mi
          cpu: 50m
        limits:
          memory: 1Gi
          cpu: 500m

  vmagent:
    enabled: true
    spec:
      extraArgs:
        promscrape.streamParse: "true"
        promscrape.maxScrapeSize: "16MB"
        memory.allowedPercent: "50"
      scrapeInterval: 30s
      resources:
        requests:
          memory: 64Mi
          cpu: 25m
        limits:
          memory: 256Mi
          cpu: 200m

  alertmanager:
    enabled: false

  vmalert:
    enabled: false

  prometheus-node-exporter:
    enabled: true
    resources:
      requests:
        cpu: 25m
        memory: 40Mi
      limits:
        cpu: 100m
        memory: 100Mi

  kube-state-metrics:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 200m
        memory: 250Mi

  # Disable things we don't need
  victoria-metrics-operator:
    resources:
      requests:
        memory: 64Mi
        cpu: 25m
      limits:
        memory: 128Mi
        cpu: 100m
