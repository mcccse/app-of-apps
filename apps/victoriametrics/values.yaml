# apps/victoriametrics/values.yaml
victoria-metrics-k8s-stack:
  grafana:
    enabled: false

  vmsingle:
    enabled: true
    spec:
      retentionPeriod: "10d"
      storage:
        storageClassName: local-path
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
      resources:
        requests:
          memory: 256Mi
          cpu: 50m
        limits:
          memory: 1Gi
          cpu: 500m

  vmagent:
    enabled: true
    spec:
      scrapeInterval: 30s
      resources:
        requests:
          memory: 64Mi
          cpu: 25m
        limits:
          memory: 256Mi
          cpu: 200m

  alertmanager:
    enabled: false

  vmalert:
    enabled: false

  prometheus-node-exporter:
    enabled: true

  kube-state-metrics:
    enabled: true

  # Disable things we don't need
  victoria-metrics-operator:
    resources:
      requests:
        memory: 64Mi
        cpu: 25m
      limits:
        memory: 128Mi
        cpu: 100m
