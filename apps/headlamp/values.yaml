headlamp:
  config:
    pluginsDir: /build/plugins

  initContainers:
    - name: kubescape-plugin
      image: quay.io/kubescape/headlamp-plugin:v0.10.6
      command:
        - /bin/sh
        - -c
        - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/
      volumeMounts:
        - name: headlamp-plugins
          mountPath: /build/plugins

    - name: trivy-plugin
      image: ghcr.io/kubebeam/trivy-headlamp-plugin:v0.3.1
      command:
        - /bin/sh
        - -c
        - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/
      volumeMounts:
        - name: headlamp-plugins
          mountPath: /build/plugins

  volumeMounts:
    - name: headlamp-plugins
      mountPath: /build/plugins

  volumes:
    - name: headlamp-plugins
      emptyDir: {}

  ingress:
    enabled: false

  service:
    type: ClusterIP
