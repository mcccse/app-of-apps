# Monolithic Tempo with local persistence (dev-friendly defaults)
tempo:
  # Runtime configuration for Tempo (monolithic) with metrics-generator and memberlist rings.
  config: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            http: {}
            grpc: {}
        jaeger:
          protocols:
            thrift_http: {}
            grpc: {}
            thrift_binary: {}
            thrift_compact: {}
        zipkin: {}
        opencensus: {}
    ingester:
      lifecycler:
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
    metrics_generator:
      registry:
        external_labels:
          source: tempo
      storage:
        path: /var/tempo/metrics-generator
      processor:
        service_graphs: {}
        span_metrics: {}
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo
    compactor:
      compaction:
        block_retention: 168h

  # Persist local storage to a PVC
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: local-path
