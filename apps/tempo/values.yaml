# Monolithic Tempo with local persistence (dev-friendly defaults)
tempo:
  # Runtime configuration for Tempo (monolithic). Enables common receivers and local storage.
  config: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            http: {}
            grpc: {}
        jaeger:
          protocols:
            thrift_http: {}
            grpc: {}
            thrift_binary: {}
            thrift_compact: {}
        zipkin: {}
        opencensus: {}
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo
    compactor:
      compaction:
        block_retention: 168h

  # Persist local storage to a PVC
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: local-path
