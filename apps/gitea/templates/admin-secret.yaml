{{- /*
Creates/keeps a Gitea admin Secret with:
- username: admin
- password: random on first install, persisted across upgrades via lookup
*/ -}}
{{- $name := "gitea-admin" -}}
{{- $ns := .Release.Namespace -}}
{{- $existing := (lookup "v1" "Secret" $ns $name) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
type: Opaque
data:
  username: {{ b64enc "admin" }}
  {{- if $existing }}
  password: {{ index $existing.data "password" }}
  {{- else }}
  password: {{ randAlphaNum 20 | b64enc }}
  {{- end }}
