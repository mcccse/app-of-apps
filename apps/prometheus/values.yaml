# Minimal overrides: disable embedded Grafana, we deploy Grafana separately.
kube-prometheus-stack:
  grafana:
    enabled: false

  prometheusOperator:
    admissionWebhooks:
      enabled: true
      certManager:
        enabled: false
      patch:
        enabled: true
      failurePolicy: Ignore

  prometheus:
    prometheusSpec:
      image:
        registry: docker.io
        repository: prom/prometheus
        tag: v2.53.4
      resources:
        requests:
          memory: 512Mi
          cpu: 100m
        limits:
          memory: 2Gi
          cpu: 1000m
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
      retention: 10d
      walCompression: true
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        runAsNonRoot: true
        fsGroupChangePolicy: OnRootMismatch
