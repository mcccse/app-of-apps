# Minimal overrides: disable embedded Grafana, we deploy Grafana separately.
kube-prometheus-stack:
  grafana:
    enabled: false

  prometheusOperator:
    admissionWebhooks:
      enabled: true
      certManager:
        enabled: false
      patch:
        enabled: true
      failurePolicy: Ignore

  prometheus:
    prometheusSpec:
      resources:
        requests:
          memory: 512Mi
          cpu: 100m
        limits:
          memory: 2Gi
          cpu: 1000m
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
      retention: 10d
      walCompression: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 2000
        fsGroup: 2000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "chown -R 1000:2000 /prometheus && chmod -R 755 /prometheus",
            ]
          volumeMounts:
            - name: prometheus-prometheus-kube-prometheus-prometheus-db
              mountPath: /prometheus
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
            capabilities:
              drop: []
