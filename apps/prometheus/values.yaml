# Minimal overrides: disable embedded Grafana, we deploy Grafana separately.
kube-prometheus-stack:
  grafana:
    enabled: false

  prometheusOperator:
    admissionWebhooks:
      enabled: true
      certManager:
        enabled: false
      patch:
        enabled: true
      failurePolicy: Ignore

  prometheus:
    prometheusSpec:
      resources:
        requests:
          memory: 512Mi
          cpu: 100m
        limits:
          memory: 2Gi
          cpu: 1000m
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
      retention: 10d
      walCompression: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 2000
        fsGroup: 2000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        fsGroupChangePolicy: OnRootMismatch
