grafana:
  service:
    type: ClusterIP

  # Use a Secret named grafana-admin with keys admin-user, admin-password
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  # Auto-provision Loki datasource
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki.loki.svc.cluster.local:3100
          isDefault: true
          jsonData:
            maxLines: 1000
