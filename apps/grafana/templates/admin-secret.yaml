{{- /*
Creates/keeps a Grafana admin Secret with:
- admin-user: admin
- admin-password: random on first install, persisted across upgrades via lookup
*/ -}}
{{- $name := "grafana-admin" -}}
{{- $ns := .Release.Namespace -}}
{{- $existing := (lookup "v1" "Secret" $ns $name) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
type: Opaque
data:
  admin-user: {{ b64enc "admin" }}
  {{- if $existing }}
  admin-password: {{ index $existing.data "admin-password" }}
  {{- else }}
  admin-password: {{ randAlphaNum 20 | b64enc }}
  {{- end }}
